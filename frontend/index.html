<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SampleWiki - Каталог сэмплов</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- НАВИГАЦИЯ -->
    <nav class="navbar">
        <div class="container">
            <div class="navbar-brand">
                <h1>🎵 SampleWiki</h1>
            </div>
            <ul class="navbar-menu" id="navMenu">
                <li><a href="#" onclick="showPage('artists')">Исполнители</a></li>
                <li><a href="#" onclick="showPage('search')">Поиск</a></li>
                <li><a href="#" onclick="showPage('history')">История</a></li>
                <li id="authNav"><a href="#" onclick="toggleAuth()">Вход</a></li>
            </ul>
        </div>
    </nav>

    <!-- КОНТЕЙНЕР ПРИЛОЖЕНИЯ -->
    <div class="container main-content">
        <!-- СЕКЦИЯ АУТЕНТИФИКАЦИИ -->
        <section id="authSection" class="auth-section" style="display: none;">
            <div class="auth-container">
                <div class="auth-form">
                    <h2 id="authTitle">Вход</h2>
                    <form id="authForm">
                        <input type="text" id="usernameInput" placeholder="Имя пользователя" required>
                        <input type="email" id="emailInput" placeholder="Email (только регистрация)" style="display: none;">
                        <input type="password" id="passwordInput" placeholder="Пароль" required>
                        <button type="submit" id="authButton">Вход</button>
                        <button type="button" id="toggleAuthMode" onclick="toggleAuthMode()" style="background-color: #a78bfa;">Регистрация</button>
                    </form>
                </div>
            </div>
        </section>

        <!-- СЕКЦИЯ ИСПОЛНИТЕЛЕЙ -->
        <section id="artistsSection" class="section">
            <h2>Исполнители</h2>
            <div id="artistsList" class="grid">
                <p>Загрузка...</p>
            </div>
        </section>

        <!-- СЕКЦИЯ ДЕТАЛЕЙ ИСПОЛНИТЕЛЯ -->
        <section id="artistDetailSection" class="section" style="display: none;">
            <button onclick="showPage('artists')" class="btn-back">← Назад к исполнителям</button>
            <div id="artistDetail"></div>
        </section>

        <!-- СЕКЦИЯ ДЕТАЛЕЙ ТРЕКА -->
        <section id="trackDetailSection" class="section" style="display: none;">
            <button onclick="showPage('artist')" class="btn-back">← Назад к исполнителю</button>
            <div id="trackDetail"></div>
        </section>

        <!-- СЕКЦИЯ ДЕТАЛЕЙ СЭМПЛА -->
        <section id="sampleDetailSection" class="section" style="display: none;">
            <button onclick="showPage('track')" class="btn-back">← Назад к треку</button>
            <div id="sampleDetail"></div>
        </section>

        <!-- СЕКЦИЯ ПОИСКА -->
        <section id="searchSection" class="section" style="display: none;">
            <h2>Поиск</h2>
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Поиск исполнителей, альбомов, треков, сэмплов..." onkeyup="performSearch()">
                <button onclick="performSearch()" class="btn-primary">Поиск</button>
            </div>
            <div id="searchResults"></div>
        </section>

        <!-- СЕКЦИЯ ИСТОРИИ ПРАВОК -->
        <section id="historySection" class="section" style="display: none;">
            <h2>История правок</h2>
            <div id="historyList" class="history-list">
                <p>Загрузка...</p>
            </div>
        </section>

        <!-- TOAST УВЕДОМЛЕНИЯ -->
        <div id="toast" class="toast"></div>
    </div>

    <!-- СКРИПТЫ -->
    <script src="modules/utils.js"></script>
    <script src="modules/auth.js"></script>
    <script src="modules/api.js"></script>
    <script src="modules/render.js"></script>
    <script src="app.js"></script>
</body>
</html>
