<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>document.write(`<base href="${document.querySelector('script[src*="app.js"]').src.replace(/app\.js.*$/, '')}">`)</script>
    <title>SampleWiki - Каталог сэмплов</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- НАВИГАЦИЯ -->
    <nav class="navbar">
        <div class="container">
            <div class="navbar-brand">
                <h1 style="cursor:pointer;" onclick="navigateTo('')">SampleWiki</h1>
            </div>
            <ul class="navbar-menu" id="navMenu">
                <li><a href="javascript:void(0)" onclick="navigateTo('')">Исполнители</a></li>
                <li><a href="javascript:void(0)" onclick="navigateTo('search')">Поиск</a></li>
                <li><a href="javascript:void(0)" onclick="navigateTo('history')">История</a></li>
                <li id="authNav"><a href="#" onclick="toggleAuth()">Вход</a></li>
            </ul>
        </div>
    </nav>

    <!-- КОНТЕЙНЕР ПРИЛОЖЕНИЯ -->
    <div class="container main-content">
        <!-- СЕКЦИЯ АУТЕНТИФИКАЦИИ -->
        <section id="authSection" class="auth-section" style="display: none;">
            <div class="auth-overlay" onclick="toggleAuth()"></div>
            <div class="auth-container">
                <div class="auth-form">
                    <button class="auth-close" onclick="toggleAuth()">&times;</button>
                    <h2 id="authTitle">Вход</h2>
                    <form id="authForm" novalidate>
                        <div class="auth-field">
                            <input type="text" id="usernameInput" placeholder="Имя пользователя" required autocomplete="username">
                        </div>
                        <div class="auth-field">
                            <input type="email" id="emailInput" placeholder="Email" autocomplete="email">
                        </div>
                        <div class="auth-field">
                            <input type="password" id="passwordInput" placeholder="Пароль" required autocomplete="current-password">
                        </div>
                        <div class="auth-field" id="passwordConfirmField" style="display:none;">
                            <input type="password" id="passwordConfirmInput" placeholder="Подтвердите пароль" autocomplete="new-password">
                        </div>
                        <div id="authError" class="auth-error" style="display:none;"></div>
                        <button type="submit" id="authButton" class="auth-submit">Вход</button>
                        <button type="button" id="toggleAuthMode" onclick="toggleAuthMode()" class="auth-toggle">Зарегистрироваться</button>
                    </form>
                </div>
            </div>
        </section>

        <!-- СЕКЦИЯ ИСПОЛНИТЕЛЕЙ -->
        <section id="artistsSection" class="section">
            <h2>Исполнители</h2>
            <div id="artistsList" class="grid">
                <p>Загрузка...</p>
            </div>
        </section>

        <!-- СЕКЦИЯ ДЕТАЛЕЙ ИСПОЛНИТЕЛЯ -->
        <section id="artistDetailSection" class="section" style="display: none;">
            <button onclick="navigateTo('')" class="btn-back">← Назад к исполнителям</button>
            <div id="artistDetail"></div>
        </section>

        <!-- СЕКЦИЯ ДЕТАЛЕЙ ТРЕКА -->
        <section id="trackDetailSection" class="section" style="display: none;">
            <button onclick="goBackToArtist()" class="btn-back">← Назад к исполнителю</button>
            <div id="trackDetail"></div>
        </section>

        <!-- СЕКЦИЯ ДЕТАЛЕЙ СЭМПЛА -->
        <section id="sampleDetailSection" class="section" style="display: none;">
            <button onclick="goBackToTrack()" class="btn-back">← Назад к треку</button>
            <div id="sampleDetail"></div>
        </section>

        <!-- СЕКЦИЯ ПОИСКА -->
        <section id="searchSection" class="section" style="display: none;">
            <h2>Поиск</h2>
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Поиск исполнителей, альбомов, треков, сэмплов..." onkeyup="performSearch()">
                <button onclick="performSearch()" class="btn-primary">Поиск</button>
            </div>
            <div id="searchResults"></div>
        </section>

        <!-- СЕКЦИЯ ИСТОРИИ ПРАВОК -->
        <section id="historySection" class="section" style="display: none;">
            <h2>История правок</h2>
            <div id="historyList" class="history-list">
                <p>Загрузка...</p>
            </div>
        </section>

        <!-- TOAST УВЕДОМЛЕНИЯ -->
        <div id="toast" class="toast"></div>
    </div>

    <!-- СКРИПТЫ -->
    <script src="modules/utils.js"></script>
    <script src="modules/auth.js"></script>
    <script src="modules/api.js"></script>
    <script src="modules/render.js"></script>
    <script src="app.js"></script>
</body>
</html>
