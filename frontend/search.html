<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SampleWiki — Поиск</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="navbar-brand">
                <h1 style="cursor:pointer;" onclick="window.location.href='index.html'">SampleWiki</h1>
            </div>
            <ul class="navbar-menu" id="navMenu">
                <li><a href="index.html">Исполнители</a></li>
                <li><a href="search.html">Поиск</a></li>
                <li id="authNav"><a href="javascript:void(0)" onclick="toggleAuth()">Вход</a></li>
            </ul>
        </div>
    </nav>

    <div class="container main-content">
        <h2>Поиск</h2>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Поиск исполнителей, треков, сэмплов..." onkeyup="performSearch()">
            <button onclick="performSearch()" class="btn-primary">Поиск</button>
        </div>
        <div id="searchResults"></div>
        <div id="toast" class="toast"></div>
    </div>

    <script src="modules/utils.js"></script>
    <script src="modules/auth.js"></script>
    <script src="modules/api.js"></script>
    <script src="modules/render.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            await checkAuth();
            updateUIAuthState();
        });

        const performSearch = debounce(async function() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) {
                document.getElementById('searchResults').innerHTML = '<p class="empty-state">Введите поисковый запрос</p>';
                return;
            }
            try {
                const results = await globalSearch(query);
                renderSearchResults(results);
            } catch (e) {
                showToast('Ошибка поиска: ' + e.message, 'error');
            }
        }, 300);
    </script>
</body>
</html>
