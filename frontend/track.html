<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SampleWiki — Трек</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="navbar-brand">
                <h1 style="cursor:pointer;" onclick="window.location.href='index.html'">SampleWiki</h1>
            </div>
            <ul class="navbar-menu" id="navMenu">
                <li><a href="index.html">Исполнители</a></li>
                <li><a href="search.html">Поиск</a></li>
                <li id="authNav"><a href="javascript:void(0)" onclick="toggleAuth()">Вход</a></li>
            </ul>
        </div>
    </nav>

    <div class="container main-content">
        <a href="javascript:history.back()" class="btn-back">← Назад</a>
        <div id="trackDetail"></div>
        <div id="toast" class="toast"></div>
    </div>

    <script src="modules/utils.js"></script>
    <script src="modules/auth.js"></script>
    <script src="modules/api.js"></script>
    <script src="modules/render.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            await checkAuth();
            updateUIAuthState();
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            if (!id) {
                document.getElementById('trackDetail').innerHTML = '<p class="empty-state">ID трека не указан</p>';
                return;
            }
            try {
                const track = await getTrackById(parseInt(id));
                const samples = await getSamplesByTrack(parseInt(id));
                renderTrackDetail(track, samples);
            } catch (e) {
                document.getElementById('trackDetail').innerHTML = '<p class="empty-state">Ошибка загрузки: ' + e.message + '</p>';
            }
        });
    </script>
</body>
</html>
